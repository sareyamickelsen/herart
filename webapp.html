<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HERart - Guess the Artist</title>
  <style>
    /* Base Styles */
    body {
      margin: 0;
      padding: 0;
      font-family: Georgia, serif;
      background-color: #fff8f5;
      color: #3b2a2a;
    }

    /* Navbar */
    #navbar {
      background-color: #6b2737;
      padding: 15px 30px;
      text-align: center;
    }

    #navbar a {
      color: #f2c4ce;
      text-decoration: none;
      margin: 0 15px;
      font-size: 1em;
    }

    #navbar a:hover {
      color: #ffffff;
      text-decoration: underline;
    }

    /* Hero */
    #hero {
      background-color: #6b2737;
      color: #f2c4ce;
      text-align: center;
      padding: 40px 20px;
    }

    #hero h1 {
      font-size: 2.5em;
      letter-spacing: 4px;
      margin-bottom: 5px;
      color: #f2c4ce;
    }

    #hero p {
      font-style: italic;
      font-size: 1.1em;
      color: #fff8f5;
    }

    /* Game Container */
    #game-container {
      max-width: 700px;
      margin: 40px auto;
      padding: 30px;
      background-color: #ffffff;
      border: 1px solid #f2c4ce;
      border-radius: 8px;
      text-align: center;
    }

    #score-board {
      display: flex;
      justify-content: space-around;
      margin-bottom: 20px;
      font-size: 1.1em;
    }

    #score-board span {
      background-color: #fff0f3;
      border: 1px solid #f2c4ce;
      border-radius: 6px;
      padding: 8px 20px;
      color: #6b2737;
      font-weight: bold;
    }

    #clue-box {
      background-color: #fff0f3;
      border: 1px solid #f2c4ce;
      border-radius: 8px;
      padding: 25px;
      margin-bottom: 25px;
    }

    #clue-number {
      font-size: 0.9em;
      color: #a04455;
      margin-bottom: 8px;
    }

    #clue-text {
      font-size: 1.2em;
      color: #3b2a2a;
      line-height: 1.6;
    }

    /* Answer Buttons */
    #answers {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .answer-btn {
      background-color: #fff0f3;
      border: 2px solid #f2c4ce;
      border-radius: 6px;
      padding: 14px;
      font-family: Georgia, serif;
      font-size: 1em;
      color: #3b2a2a;
      cursor: pointer;
      transition: all 0.2s;
    }

    .answer-btn:hover {
      background-color: #6b2737;
      color: #ffffff;
      border-color: #6b2737;
    }

    .answer-btn.correct {
      background-color: #4caf50;
      color: white;
      border-color: #4caf50;
    }

    .answer-btn.wrong {
      background-color: #e57373;
      color: white;
      border-color: #e57373;
    }

    /* Feedback */
    #feedback {
      font-size: 1.1em;
      font-weight: bold;
      min-height: 30px;
      margin-bottom: 15px;
      color: #6b2737;
    }

    /* Next Button */
    #next-btn {
      background-color: #6b2737;
      color: #f2c4ce;
      border: none;
      border-radius: 6px;
      padding: 12px 30px;
      font-family: Georgia, serif;
      font-size: 1em;
      cursor: pointer;
      display: none;
    }

    #next-btn:hover {
      background-color: #a04455;
    }

    /* Results Screen */
    #results-container {
      max-width: 700px;
      margin: 40px auto;
      padding: 30px;
      background-color: #ffffff;
      border: 1px solid #f2c4ce;
      border-radius: 8px;
      text-align: center;
      display: none;
    }

    #results-container h2 {
      color: #6b2737;
      font-size: 2em;
    }

    #final-score {
      font-size: 1.5em;
      color: #a04455;
      margin: 15px 0;
    }

    #result-message {
      font-size: 1.1em;
      margin-bottom: 25px;
      line-height: 1.6;
    }

    #restart-btn {
      background-color: #6b2737;
      color: #f2c4ce;
      border: none;
      border-radius: 6px;
      padding: 12px 30px;
      font-family: Georgia, serif;
      font-size: 1em;
      cursor: pointer;
    }

    #restart-btn:hover {
      background-color: #a04455;
    }

    /* Footer */
    #footer {
      background-color: #6b2737;
      color: #f2c4ce;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
      font-family: Georgia, serif;
    }

    #footer a {
      color: #f2c4ce;
      margin: 0 10px;
      text-decoration: none;
    }

    #footer a:hover {
      color: #ffffff;
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div id="navbar">
    <a href="index.html">Home</a>
    <a href="gallery.html">Gallery</a>
    <a href="resume.html">Résumé</a>
    <a href="contact.html">Contact</a>
    <a href="scratch.html">Scratch Page</a>
  </div>

  <!-- HERO -->
  <div id="hero">
    <h1>Guess the Artist 🎨</h1>
    <p>Test your knowledge of famous women artists throughout history!</p>
  </div>

  <!-- GAME -->
  <div id="game-container">

    <!-- Score Board -->
    <div id="score-board">
      <span>Question: <span id="q-number">1</span> / 8</span>
      <span>Score: <span id="score">0</span></span>
    </div>

    <!-- Clue Box -->
    <div id="clue-box">
      <div id="clue-number">Clue</div>
      <div id="clue-text"></div>
    </div>

    <!-- Answer Buttons -->
    <div id="answers">
      <button class="answer-btn" onclick="checkAnswer(0)"></button>
      <button class="answer-btn" onclick="checkAnswer(1)"></button>
      <button class="answer-btn" onclick="checkAnswer(2)"></button>
      <button class="answer-btn" onclick="checkAnswer(3)"></button>
    </div>

    <!-- Feedback -->
    <div id="feedback"></div>

    <!-- Next Button -->
    <button id="next-btn" onclick="nextQuestion()">Next Question →</button>

  </div>

  <!-- RESULTS -->
  <div id="results-container">
    <h2>🎨 Game Over!</h2>
    <div id="final-score"></div>
    <div id="result-message"></div>
    <button id="restart-btn" onclick="restartGame()">Play Again</button>
  </div>

  <!-- FOOTER -->
  <div id="footer">
    <p>&copy; 2026 HERart - Celebrating Women in Art</p>
    <a href="index.html">Home</a> |
    <a href="scratch.html">Scratch Page</a> |
    <a href="gallery.html">Gallery</a>
  </div>

  <script>
    const questions = [
      {
        clue: "I was born in Bologna, Italy in 1552. I became one of the first professional female artists in Western history and the first woman to paint large-scale public commissions.",
        answers: ["Lavinia Fontana", "Artemisia Gentileschi", "Sofonisba Anguissola", "Barbara Longhi"],
        correct: 0
      },
      {
        clue: "I was an American Impressionist painter who moved to Paris and was the only American — and one of the few women — accepted into the French Impressionist group. I loved painting mothers and children.",
        answers: ["Berthe Morisot", "Mary Cassatt", "Rosa Bonheur", "Camille Claudel"],
        correct: 1
      },
      {
        clue: "I was a Mexican painter known for my deeply personal self-portraits. I suffered a terrible accident at 18 and used painting to process my pain. I am considered an icon of identity and resilience.",
        answers: ["Remedios Varo", "Frida Kahlo", "Leonora Carrington", "Maria Izquierdo"],
        correct: 1
      },
      {
        clue: "I am an American contemporary artist working in photography, video, and installation. My work addresses race, gender, and class. My most famous series features a woman alone at a kitchen table.",
        answers: ["Kara Walker", "Carrie Mae Weems", "Faith Ringgold", "Lorna Simpson"],
        correct: 1
      },
      {
        clue: "I was a Renaissance sculptor and painter, one of the first known women artists in Western art. I was also a close friend and correspondent of Michelangelo.",
        answers: ["Lavinia Fontana", "Barbara Longhi", "Sofonisba Anguissola", "Properzia de' Rossi"],
        correct: 2
      },
      {
        clue: "I was a French Impressionist and the only major female painter in the core Impressionist group. I was the sister-in-law of Édouard Manet and known for my delicate brushwork.",
        answers: ["Mary Cassatt", "Berthe Morisot", "Eva Gonzalès", "Marie Bracquemond"],
        correct: 1
      },
      {
        clue: "I was an Italian Baroque painter famous for depicting strong heroic women from the Bible. I was one of the first women to achieve recognition in the male-dominated world of 17th century art.",
        answers: ["Lavinia Fontana", "Sofonisba Anguissola", "Artemisia Gentileschi", "Barbara Longhi"],
        correct: 2
      },
      {
        clue: "I am a contemporary American artist known for large-scale silhouette works exploring the history of slavery and racism in America. I was awarded a MacArthur Fellowship in 1997.",
        answers: ["Carrie Mae Weems", "Faith Ringgold", "Kara Walker", "Lorna Simpson"],
        correct: 2
      }
    ];

    let currentQuestion = 0;
    let score = 0;
    let answered = false;

    function loadQuestion() {
      const q = questions[currentQuestion];
      document.getElementById("clue-text").textContent = q.clue;
      document.getElementById("clue-number").textContent = "Clue " + (currentQuestion + 1) + " of " + questions.length;
      document.getElementById("q-number").textContent = currentQuestion + 1;
      document.getElementById("feedback").textContent = "";
      document.getElementById("next-btn").style.display = "none";

      const buttons = document.querySelectorAll(".answer-btn");
      buttons.forEach((btn, i) => {
        btn.textContent = q.answers[i];
        btn.className = "answer-btn";
        btn.disabled = false;
      });

      answered = false;
    }

    function checkAnswer(index) {
      if (answered) return;
      answered = true;

      const q = questions[currentQuestion];
      const buttons = document.querySelectorAll(".answer-btn");

      buttons.forEach(btn => btn.disabled = true);
      buttons[q.correct].classList.add("correct");

      if (index === q.correct) {
        score++;
        document.getElementById("score").textContent = score;
        document.getElementById("feedback").textContent = "✅ Correct! Well done!";
        document.getElementById("feedback").style.color = "#4caf50";
      } else {
        buttons[index].classList.add("wrong");
        document.getElementById("feedback").textContent = "❌ Not quite! The correct answer was " + q.answers[q.correct] + ".";
        document.getElementById("feedback").style.color = "#e57373";
      }

      document.getElementById("next-btn").style.display = "inline-block";
    }

    function nextQuestion() {
      currentQuestion++;
      if (currentQuestion < questions.length) {
        loadQuestion();
      } else {
        showResults();
      }
    }

    function showResults() {
      document.getElementById("game-container").style.display = "none";
      document.getElementById("results-container").style.display = "block";
      document.getElementById("final-score").textContent = "You scored " + score + " out of " + questions.length + "!";

      let message = "";
      if (score === questions.length) {
        message = "🌟 Perfect score! You are a true HERart expert! Women artists everywhere are proud of you.";
      } else if (score >= 6) {
        message = "🎨 Amazing! You know your women artists really well. Keep celebrating their legacy!";
      } else if (score >= 4) {
        message = "👏 Great effort! You have a solid knowledge of women in art. Keep exploring HERart to learn more!";
      } else {
        message = "🌸 Good try! There is so much to discover about women artists throughout history. Explore our gallery to learn more!";
      }

      document.getElementById("result-message").textContent = message;
    }

    function restartGame() {
      currentQuestion = 0;
      score = 0;
      document.getElementById("score").textContent = 0;
      document.getElementById("results-container").style.display = "none";
      document.getElementById("game-container").style.display = "block";
      loadQuestion();
    }

    // Start the game
    loadQuestion();
  </script>

</body>
</html>
